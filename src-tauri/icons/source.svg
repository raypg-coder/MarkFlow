<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- ─────────────────────────────────────────────────────
       MarkFlow · Mf monogram
       Cream paper bg + slab-serif M with V counter +
       F top/middle arms sharing M's right pillar +
       magenta ink-drop period.
       ───────────────────────────────────────────────────── -->

  <!-- 米色书纸背景（带 iOS 圆角） -->
  <rect width="1024" height="1024" rx="192" fill="#E8DAB0"/>

  <!-- M 字身 -->
  <path d="
    M 162 760
    L 162 256
    L 274 256
    L 450 528
    L 626 256
    L 738 256
    L 738 760
    Z
  " fill="#1E2638"/>

  <!-- 共享 slab serif foot -->
  <rect x="130" y="724" width="176" height="44" fill="#1E2638"/>
  <rect x="594" y="724" width="176" height="44" fill="#1E2638"/>

  <!-- F 顶横（与 M 右柱共享垂直） -->
  <rect x="738" y="256" width="156" height="44" fill="#1E2638"/>

  <!-- F 中横 -->
  <rect x="738" y="444" width="120" height="36" fill="#1E2638"/>

  <!-- 品红句点（Mf.） -->
  <circle cx="932" cy="756" r="20" fill="#D92E63"/>
</svg>
